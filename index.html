
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.85, maximum-scale=2.0, user-scalable=yes">
    <title>Motion Visualization - Grid Cell Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            padding: 0;
            margin: 0;
            width: 100vw;
            overflow-x: hidden; /* Prevent horizontal scrolling */
        }

        .sidebar {
            width: 150px;
            min-width: 150px; /* Ensure minimum width */
            max-width: 150px; /* Ensure maximum width */
            background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
            padding: 15px;
            overflow-y: auto;
            position: relative;
            z-index: 1000; /* High z-index to ensure sidebar is always on top */
            flex-shrink: 0; /* Prevent sidebar from shrinking */
            flex-grow: 0; /* Prevent sidebar from growing */
        }

        .main-content {
            flex: 1;
            display: flex;
            padding: 5px 2px 5px 20px; /* Increased left padding to push content away from sidebar */
            gap: 3px; /* Minimal gap between sections */
            background: linear-gradient(135deg, #ffffff, #f8f8f8);
            min-width: 0; /* Allow flex items to shrink below their content size */
            position: relative;
            z-index: 1; /* Lower than sidebar */
            overflow: hidden; /* Prevent content from overflowing */
            margin-left: 0; /* Ensure it starts right after sidebar */
            box-sizing: border-box; /* Include padding in width calculation */
        }

        .visualization-section {
            flex: 1; /* Reduced from 8 - make it smaller */
            display: flex;
            justify-content: flex-start; /* Changed from center to push content right */
            align-items: flex-start;
            max-width: 65%; /* Reduced from 78% */
            min-width: 0; /* Allow shrinking */
            padding-top: 5px;
            padding-left: 20px; /* Increased left padding to push away from sidebar */
            position: relative;
            overflow: hidden; /* Prevent overflow */
            box-sizing: border-box; /* Include padding in width calculation */
        }

        .legend-section {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 5px; /* Reduced from 10px */
            min-width: 120px; /* Reduced from 200px */
            width: 120px; /* Reduced from 200px */
            flex-shrink: 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px; /* Reduced from 8px */
            font-size: 10px; /* Reduced from 12px */
            color: #333;
            width: 100%;
            min-width: 100px; /* Reduced from 180px */
        }
        
        .legend-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .legend-circle {
            width: 10px; /* Reduced from 12px */
            height: 10px; /* Reduced from 12px */
            border-radius: 50%;
            border: 2px solid #ffffff;
            margin-right: 6px; /* Reduced from 8px */
            flex-shrink: 0;
        }

        .graph-section {
            display: flex;
            flex-direction: row; /* Side by side instead of column */
            align-items: flex-start;
            justify-content: center;
            padding: 5px;
            gap: 10px; /* Space between IB and MDS plots */
            width: 100%;
            box-sizing: border-box;
        }

        .graph-section h3 {
            margin: 0 0 20px 0;
            color: #4fc3f7;
            font-size: 18px;
        }

        .curve-canvas {
            background: #ffffff;
            max-width: 100%; /* Ensure it doesn't overflow */
            height: auto; /* Maintain aspect ratio */
            flex: 0 0 auto; /* Don't grow or shrink */
        }

        .mds-canvas {
            background: #ffffff;
            max-width: 100%; /* Ensure it doesn't overflow */
            height: auto; /* Maintain aspect ratio */
            flex: 0 0 auto; /* Don't grow or shrink */
        }

        .graph-info {
            font-size: 12px;
            color: #666;
            text-align: center;
            padding: 10px;
        }

        h1 {
            margin-bottom: 30px;
            color: #64b5f6;
            font-size: 24px;
            text-align: center;
        }

        .upload-section {
            margin-bottom: 20px;
            padding: 5px;
        }

        .upload-section h3 {
            margin-top: 0;
            color: #81c784;
            font-size: 8px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 10px 15px;
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
            text-align: center;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .file-input-label:hover {
            background: linear-gradient(135deg, #45a049, #4caf50);
            transform: translateY(-2px);
        }

        .file-status {
            margin-top: 10px;
            padding: 8px;
            background: rgba(0,0,0,0.1);
            border-radius: 5px;
            font-size: 12px;
            color: #666;
        }

        .parameter-control {
            margin-top: 20px;
            padding: 15px;
        }

        .parameter-control h3 {
            margin-top: 0;
            color: #ffb74d;
            font-size: 16px;
        }

        .slider-container {
            margin: 15px 0;
        }

        .slider-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .slider:hover {
            opacity: 1;
        }

        .slider::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff6b6b;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,107,107,0.5);
        }

        .slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff6b6b;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(255,107,107,0.5);
        }

        .slider-value {
            text-align: center;
            margin-top: 5px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .controls {
            margin-top: 20px;
            padding: 15px;
        }

        .controls h3 {
            margin-top: 0;
            color: #ba68c8;
            font-size: 16px;
        }

        .control-button {
            width: 100%;
            padding: 5px;
            margin: 2.5px 0;
            background: linear-gradient(135deg, #6a1b9a, #8e24aa);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1001; /* Even higher than sidebar to ensure buttons are always clickable */
            pointer-events: auto; /* Explicitly enable pointer events */
        }

        .control-button:hover {
            background: linear-gradient(135deg, #8e24aa, #6a1b9a);
            transform: translateY(-2px);
        }

        .control-button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .visualization-canvas {
            background: #ffffff;
            width: 100%; /* Ensure it uses full available width */
            max-width: 100%;
            max-height: 85vh; /* Reduced from 90vh to make it slightly smaller */
            position: relative; /* Ensure it stays within its container */
            z-index: 1; /* Lower than sidebar */
            pointer-events: auto; /* Ensure canvas is interactive */
        }

        .info-display {
            margin-top: 20px;
            padding: 15px;
            font-size: 12px;
        }

        .info-display h4 {
            margin: 0 0 10px 0;
            color: #4fc3f7;
        }

        .info-item {
            margin: 5px 0;
            color: #333;
        }

        .loading-indicator {
            display: none;
            text-align: center;
            padding: 20px;
            color: #64b5f6;
        }

        .loading-indicator.show {
            display: block;
        }

        .error-message {
            display: none;
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid rgba(244, 67, 54, 0.3);
            margin-top: 10px;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 40vh;
            }
            
            .main-content {
                flex: 1;
                flex-direction: column !important;
                gap: 10px !important;
            }
            
            .visualization-section {
                flex: none !important;
            }
            
            .graph-section {
                flex: none !important;
                min-width: auto !important;
                width: 100%;
            }
            
            .visualization-canvas {
                max-width: 100%;
                height: auto;
            }
            
            .curve-canvas {
                max-width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <!-- <h1>Model</h1> -->
            <div class="upload-section">
                <button id="load-dtw-model" class="control-button" style="background: linear-gradient(135deg, #1b5e20, #2e7d32);">qpwr soft-dtw</button>
                <button id="load-dtw-model-2" class="control-button" style="background: linear-gradient(135deg, #1b5e20, #2e7d32);">qpos soft-dtw</button>
                <button id="load-dtw-model-3" class="control-button" style="background: linear-gradient(135deg, #1b5e20, #2e7d32);">qvel soft-dtw</button>
                <button id="load-dtw-model-4" class="control-button" style="background: linear-gradient(135deg, #1b5e20, #2e7d32);">qfrc_actuator soft-dtw</button>
            </div>

            <div class="parameter-control">
                <!-- <h3> Parameter Control</h3> -->
                <div class="slider-container">
                    <!-- <label class="slider-label">&#946 Value</label> -->
                    <!-- <input type="range" id="parameter-slider" class="slider" min="0" max="9" value="0" step="1" disabled> -->
                    <!-- <div class="slider-value" id="parameter-value">0</div> -->
                </div>
            </div>

            <div class="controls">
                <!-- <h3> Controls</h3> -->
                <video id="cell-video" width="125" height="94" style="background: #000; border-radius: 5px; margin-top: 10px;" controls loop>
                    Your browser does not support the video tag.
                </video>

            </div>

            <div class="info-display">
                <!-- <h4> Info</h4> -->
                <!-- <div class="info-item">Grid: <span id="grid-size">-</span></div> -->
                <!-- <div class="info-item">Cell Size: <span id="cell-size">-</span></div> -->
                <!-- <div class="info-item">Frames: <span id="frame-count">-</span></div> -->
                <!-- <div class="info-item">Parameters: <span id="param-count">-</span></div> -->
                <!-- <div class="info-item">FPS: <span id="fps-display">-</span></div> -->
            </div>

            <div class="loading-indicator" id="loading">
                <div> Processing...</div>
            </div>

            <div class="error-message" id="error-message"></div>
        </div>

        <div class="main-content">
            <div class="visualization-section">
                <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
                    <div style="position: relative; width: 100%;">
                        <canvas id="visualization-canvas" class="visualization-canvas" width="1600" height="1200"></canvas>
                        <canvas id="overlay-canvas" style="position: absolute; top: 0; left: 0; pointer-events: none; z-index: 2;" width="1600" height="1200"></canvas>
                    </div>
                    <canvas id="pwm-plot-canvas" style="background: #ffffff; margin-top: 5px;" width="1600" height="240"></canvas>
                    <canvas id="pmw-lines-plot-canvas" style="background: #ffffff; margin-top: 5px;" width="1600" height="240"></canvas>
                    <!-- IB and MDS plots placed below p(m|w) line graph, side by side -->
                    <div class="graph-section">
                        <canvas id="curve-canvas" class="curve-canvas" width="450" height="340"></canvas>
                        <canvas id="mds-canvas" class="mds-canvas" width="450" height="340"></canvas>
                    </div>
                </div>
            </div>
            <div class="legend-section" id="legend-section">
                <!-- Legend will be dynamically added here -->
            </div>
        </div>
    </div>

    <script src="visualization.js"></script>
</body>
</html>
